title: r-val-hub

author: R Validation Hub
version: 1.0.0
quarto-required: ">=1.6.0"
contributes:
  metadata:
    project:
      brand: _brand.yml

  filters:
    - typst-grid.lua

  shortcodes:
    - shortcodes/metric-card.lua

  formats:
    html:
      toc: true
      embed-resources: true
      favicon: html/assets/favicon.svg
      format-resources:
        - shared/assets
        - _brand.yml
      include-in-header:
        - text: |
            <link rel="icon" type="image/svg" href="{{< brand logo small >}}">
      include-before-body:
        - text: |
            <div class="brand-header">
              <img class="brand-logo-img" src="{{< brand logo medium >}}" alt="R Validation Hub Logo"/>
            </div>
      theme:
        # NOTE:
        # Variables (scss:defaults) are applied in _reverse_ order, whereas all
        # other scss directives are applied in sequential order. In order to use
        # brand variables to derive other variables, we must specify variables
        # _first_.
        #
        # https://quarto.org/docs/output-formats/html-themes-more.html#bootstrap-bootswatch-layering
        # 
        dark: 
          - html/assets/custom-variables.scss
          - darkly
          - brand
          - html/assets/custom-rules.scss
        light:
          - html/assets/custom-variables-light.scss
          - html/assets/custom-variables.scss
          - flatly
          - brand
          - html/assets/custom-rules.scss

    typst:
      template: typst/template.typ
      template-partials:
        - typst/brand.typ
        - typst/typst-template.typ
        - typst/typst-show.typ

